<!DOCTYPE html>
<html>
<head>
    <title>Rutas de Vuelos BFS</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 15px;
            width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            color: #333;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 10px;
            color: #555;
        }

        select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
        }

        button {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            background: linear-gradient(135deg, #5a67d8, #6b46c1);
        }

        .ruta {
            margin-top: 20px;
            padding: 15px;
            background: #f1f5f9;
            border-radius: 10px;
            color: #333;
            font-weight: bold;
        }

        .ruta span {
            color: #667eea;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>✈️ Rutas de Vuelos BFS</h2>

    <form method="POST">
        {% csrf_token %}

        <label>Origen:</label>
        <select name="origen" required>
            <option value="Jiloyork">Jiloyork</option>
            <option value="Sonora">Sonora</option>
            <option value="Guanajuato">Guanajuato</option>
            <option value="Oaxaca">Oaxaca</option>
            <option value="Sinaloa">Sinaloa</option>
            <option value="Querétaro">Querétaro</option>
            <option value="Celaya">Celaya</option>
            <option value="Zacatecas">Zacatecas</option>
            <option value="Monterrey">Monterrey</option>
            <option value="Tamaulipas">Tamaulipas</option>
        </select>

        <label>Destino:</label>
        <select name="destino" required>
            <option value="Jiloyork">Jiloyork</option>
            <option value="Sonora">Sonora</option>
            <option value="Guanajuato">Guanajuato</option>
            <option value="Oaxaca">Oaxaca</option>
            <option value="Sinaloa">Sinaloa</option>
            <option value="Querétaro">Querétaro</option>
            <option value="Celaya">Celaya</option>
            <option value="Zacatecas">Zacatecas</option>
            <option value="Monterrey">Monterrey</option>
            <option value="Tamaulipas">Tamaulipas</option>
        </select>

        <button type="submit">Buscar ruta</button>
    </form>

    {% if ruta %}
        <div class="ruta">
            🛫 Ruta encontrada:<br><br>
            {% for ciudad in ruta %}
                <span>{{ ciudad }}</span>
                {% if not forloop.last %} ➡️ {% endif %}
            {% endfor %}
        </div>
    {% endif %}
</div>

</body>
</html>
